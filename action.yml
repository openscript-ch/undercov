name: undercov
description: Track LCOV coverage in a dedicated git branch and fail on under-coverage.
inputs:
  files:
    description: Glob pattern for LCOV files.
    required: false
    default: '**/coverage/lcov.info'
  branch:
    description: Branch used to store coverage data.
    required: false
    default: coverage
  threshold:
    description: Minimum coverage percentage.
    required: false
    default: '0'
  check-regression:
    description: Fail if coverage regresses compared to previously stored data.
    required: false
    default: 'false'
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        set -euo pipefail
        if [[ ! -x "./undercov" ]]; then
          echo "undercov binary not found; build or download it before using this action" >&2
          exit 1
        fi
        ./undercov --files '${{ inputs.files }}' --branch '${{ inputs.branch }}' --threshold '${{ inputs.threshold }}' --check-regression='${{ inputs.check-regression }}'
