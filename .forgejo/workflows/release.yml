name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., v1.0.0)"
        required: true
        type: string
  workflow_call:
    inputs:
      version:
        description: "Version to release (e.g., v1.0.0)"
        required: true
        type: string

jobs:
  release:
    name: Build and Release
    runs-on: srv-obin-ch_ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: https://code.forgejo.org/actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.version || github.ref }}

      - name: Set up Go
        uses: https://code.forgejo.org/actions/setup-go@v6
        with:
          go-version-file: ".tool-versions"

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="${{ inputs.version }}"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      - name: Install dependencies
        run: go mod download

      - name: Run tests
        run: go test ./...

      - name: Build multiarch binaries
        run: make build-multiarch VERSION=${{ steps.version.outputs.version }}

      - name: Create checksums
        run: |
          cd build
          sha256sum undercov-* > undercov-${{ steps.version.outputs.version }}.sha256
          cat undercov-${{ steps.version.outputs.version }}.sha256

      - name: Extract release notes
        id: notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          BODY="$(awk "/^## ${VERSION}/{found=1; next} found && /^## v/{exit} found{print}" CHANGELOG.md || true)"
          if [[ -z "${BODY}" ]]; then
            BODY="Release ${VERSION}"
          fi
          echo "${BODY}" > /tmp/release-notes.md

      - name: Upload release to Forgejo
        uses: https://code.forgejo.org/actions/forgejo-release@v2.13.1
        with:
          direction: upload
          tag: ${{ steps.version.outputs.version }}
          title: Release ${{ steps.version.outputs.version }}
          release-notes-file: /tmp/release-notes.md
          release-dir: build
          token: ${{ secrets.RELEASE_BOT_TOKEN || forge.token }}
